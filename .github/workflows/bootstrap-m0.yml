          EOF

          cat > src/lib/retention.ts <<'EOF'
          export type TimedRecord = {
            createdAt: string;
          };

          export function pruneOlderThanDays<T extends TimedRecord>(
            records: T[],
            days: number,
            now = new Date()
          ): T[] {
            const cutoff = now.getTime() - days * 24 * 60 * 60 * 1000;
            return records.filter((record) => new Date(record.createdAt).getTime() >= cutoff);
          }
          EOF

          cat > src/lib/retention.test.ts <<'EOF'
          import { describe, expect, it } from "vitest";
          import { pruneOlderThanDays } from "./retention";

          describe("retention", () => {
            it("keeps records inside the retention window", () => {
              const now = new Date("2026-05-28T12:00:00Z");
              const records = [
                { createdAt: "2026-05-27T12:00:00Z", value: "keep" },
                { createdAt: "2026-04-01T12:00:00Z", value: "drop" }
              ];

              expect(pruneOlderThanDays(records, 30, now)).toEqual([
                { createdAt: "2026-05-27T12:00:00Z", value: "keep" }
              ]);
            });
          });
          EOF

          cat > src/lib/localVault.ts <<'EOF'
          const VAULT_HASH_KEY = "tornapps:vaultHash";

          async function sha256(value: string): Promise<string> {
            const data = new TextEncoder().encode(value);
            const hash = await crypto.subtle.digest("SHA-256", data);
            return Array.from(new Uint8Array(hash))
              .map((byte) => byte.toString(16).padStart(2, "0"))
              .join("");
          }

          export function hasLocalVault(): boolean {
            return localStorage.getItem(VAULT_HASH_KEY) !== null;
          }

          export async function createLocalVault(passphrase: string): Promise<void> {
            if (passphrase.trim().length < 8) {
              throw new Error("Passphrase must be at least 8 characters.");
            }
            localStorage.setItem(VAULT_HASH_KEY, await sha256(passphrase));
          }

          export async function unlockLocalVault(passphrase: string): Promise<boolean> {
            const storedHash = localStorage.getItem(VAULT_HASH_KEY);
            if (!storedHash) return false;
            return storedHash === (await sha256(passphrase));
          }

          export function resetLocalVault(): void {
            localStorage.removeItem(VAULT_HASH_KEY);
            localStorage.removeItem("tornapps:locale");
          }
          EOF

