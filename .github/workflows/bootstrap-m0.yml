          cat > src/App.tsx <<'EOF'
          import { useMemo, useState } from "react";
          import type { Locale } from "./types";
          import { modules } from "./data/modules";
          import { translate } from "./i18n/dictionaries";
          import {
            createLocalVault,
            hasLocalVault,
            resetLocalVault,
            unlockLocalVault
          } from "./lib/localVault";

          function getInitialLocale(): Locale {
            const stored = localStorage.getItem("tornapps:locale");
            return stored === "es" ? "es" : "en";
          }

          function StatusBadge({ status, t }: { status: string; t: (key: string) => string }) {
            return <span className={`status status-${status}`}>{t(`status.${status}`)}</span>;
          }

          function UnlockScreen({
            locale,
            setLocale,
            onUnlocked
          }: {
            locale: Locale;
            setLocale: (locale: Locale) => void;
            onUnlocked: () => void;
          }) {
            const t = (key: string) => translate(locale, key);
            const [passphrase, setPassphrase] = useState("");
            const [error, setError] = useState<string | null>(null);
            const vaultExists = hasLocalVault();

            async function submit() {
              setError(null);
              try {
                if (vaultExists) {
                  const ok = await unlockLocalVault(passphrase);
                  if (!ok) {
                    setError("Invalid local passphrase.");
                    return;
                  }
                } else {
                  await createLocalVault(passphrase);
                }
                onUnlocked();
              } catch (err) {
                setError(err instanceof Error ? err.message : "Unexpected error.");
              }
            }

            return (
              <main className="lock-page">
                <section className="lock-card">
                  <div className="brand-mark">TA</div>
                  <p className="eyebrow">{t("app.tagline")}</p>
                  <h1>{t("lock.title")}</h1>
                  <p className="muted">{t("lock.subtitle")}</p>

                  <label className="field-label" htmlFor="passphrase">
                    {t("lock.passphrase")}
                  </label>
                  <input
                    id="passphrase"
                    className="input"
                    type="password"
                    value={passphrase}
                    onChange={(event) => setPassphrase(event.target.value)}
                    onKeyDown={(event) => {
                      if (event.key === "Enter") void submit();
                    }}
                  />

                  {error ? <p className="error">{error}</p> : null}

                  <button className="primary-button" onClick={() => void submit()}>
                    {vaultExists ? t("lock.unlock") : t("lock.create")}
                  </button>

                  <div className="lock-actions">
                    <button className="ghost-button" onClick={() => setLocale(locale === "en" ? "es" : "en")}>
                      {locale.toUpperCase()}
                    </button>
                    <button
                      className="ghost-button"
                      onClick={() => {
                        resetLocalVault();
                        setPassphrase("");
                      }}
                    >
                      {t("lock.reset")}
                    </button>
                  </div>

                  <p className="warning">{t("lock.warning")}</p>
                </section>
              </main>
            );
          }

          function Dashboard({
            locale,
            setLocale,
            onLock
          }: {
            locale: Locale;
            setLocale: (locale: Locale) => void;
            onLock: () => void;
          }) {
            const t = (key: string) => translate(locale, key);
            const sortedModules = useMemo(() => [...modules].sort((a, b) => a.priority - b.priority), []);

            return (
              <div className="app-shell">
                <aside className="sidebar">
                  <div className="sidebar-brand">
                    <div className="brand-mark small">TA</div>
                    <div>
                      <strong>{t("app.name")}</strong>
                      <span>{t("footer.milestone")}</span>
                    </div>
                  </div>

                  <nav className="nav-list">
                    <a href="#dashboard">{t("nav.dashboard")}</a>
                    <a href="#modules">{t("nav.modules")}</a>
                    <a href="#settings">{t("nav.settings")}</a>
                  </nav>
                </aside>

                <main className="main-panel">
                  <header className="topbar">
                    <div>
                      <p className="eyebrow">{t("app.tagline")}</p>
                      <h1>{t("dashboard.title")}</h1>
                      <p className="muted">{t("dashboard.subtitle")}</p>
                    </div>
                    <div className="topbar-actions">
                      <button className="ghost-button" onClick={() => setLocale(locale === "en" ? "es" : "en")}>
                        {t("language.toggle")}: {locale.toUpperCase()}
                      </button>
                      <button className="ghost-button" onClick={onLock}>
                        Lock
                      </button>
                    </div>
                  </header>

                  <section id="dashboard" className="hero-card">
                    <div>
                      <h2>{t("dashboard.nextAction")}</h2>
                      <p>{t("dashboard.nextActionBody")}</p>
                    </div>

                    <div className="security-card">
                      <h3>{t("security.title")}</h3>
                      <p>{t("security.body")}</p>
                    </div>
                  </section>

                  <section id="modules" className="module-grid">
                    {sortedModules.map((module) => (
                      <article key={module.id} className="module-card">
                        <div className="module-card-header">
                          <h3>{t(module.titleKey)}</h3>
                          <StatusBadge status={module.status} t={t} />
                        </div>
                        <p>{t(module.descriptionKey)}</p>
                        <div className="scope-list">
                          {module.requiredScopes.map((scope) => (
                            <span key={scope}>{scope}</span>
                          ))}
                        </div>
                      </article>
                    ))}
                  </section>

                  <section id="settings" className="settings-card">
                    <h2>{t("settings.title")}</h2>
                    <p>{t("settings.body")}</p>
                  </section>
                </main>
              </div>
            );
          }

          export default function App() {
            const [locale, setLocaleState] = useState<Locale>(getInitialLocale);
            const [unlocked, setUnlocked] = useState(false);

            function setLocale(locale: Locale) {
              localStorage.setItem("tornapps:locale", locale);
              setLocaleState(locale);
            }

            if (!unlocked) {
              return <UnlockScreen locale={locale} setLocale={setLocale} onUnlocked={() => setUnlocked(true)} />;
            }

            return <Dashboard locale={locale} setLocale={setLocale} onLock={() => setUnlocked(false)} />;
          }
          EOF

