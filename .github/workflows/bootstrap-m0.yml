name: Bootstrap TornApps M0

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate TornApps M0 files
        run: |
          set -euo pipefail

          mkdir -p src/config src/data src/i18n src/lib src/styles .github/workflows

          cat > package.json <<'EOF'
          {
            "name": "tornapps",
            "private": true,
            "version": "0.0.0",
            "type": "module",
            "scripts": {
              "dev": "vite",
              "build": "tsc -b && vite build",
              "preview": "vite preview",
              "typecheck": "tsc -b --pretty",
              "test": "vitest run",
              "test:watch": "vitest"
            },
            "dependencies": {
              "@vitejs/plugin-react": "latest",
              "vite": "latest",
              "typescript": "latest",
              "react": "latest",
              "react-dom": "latest"
            },
            "devDependencies": {
              "@types/react": "latest",
              "@types/react-dom": "latest",
              "autoprefixer": "^10.4.20",
              "postcss": "^8.4.49",
              "tailwindcss": "^3.4.17",
              "vitest": "latest"
            },
            "engines": {
              "node": ">=20.0.0"
            }
          }
          EOF

          cat > index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <meta name="description" content="TornApps privacy-first personal Torn assistant" />
              <title>TornApps</title>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/src/main.tsx"></script>
            </body>
          </html>
          EOF

          cat > vite.config.ts <<'EOF'
          /// <reference types="vitest" />
          import { defineConfig } from "vite";
          import react from "@vitejs/plugin-react";

          export default defineConfig({
            base: process.env.GITHUB_ACTIONS ? "/tornapps/" : "/",
            plugins: [react()],
            test: {
              globals: true,
              environment: "node"
            }
          });
          EOF

          cat > tsconfig.json <<'EOF'
          {
            "files": [],
            "references": [
              { "path": "./tsconfig.app.json" },
              { "path": "./tsconfig.node.json" }
            ]
          }
          EOF

          cat > tsconfig.app.json <<'EOF'
          {
            "compilerOptions": {
              "target": "ES2022",
              "useDefineForClassFields": true,
              "lib": ["ES2022", "DOM", "DOM.Iterable"],
              "allowJs": false,
              "skipLibCheck": true,
              "esModuleInterop": true,
              "allowSyntheticDefaultImports": true,
              "strict": true,
              "forceConsistentCasingInFileNames": true,
              "module": "ESNext",
              "moduleResolution": "Bundler",
              "resolveJsonModule": true,
              "isolatedModules": true,
              "noEmit": true,
              "jsx": "react-jsx",
              "types": ["vite/client", "vitest/globals"]
            },
            "include": ["src"]
          }
          EOF

          cat > tsconfig.node.json <<'EOF'
          {
            "compilerOptions": {
              "composite": true,
              "skipLibCheck": true,
              "module": "ESNext",
              "moduleResolution": "Bundler",
              "allowSyntheticDefaultImports": true,
              "strict": true
            },
            "include": ["vite.config.ts"]
          }
          EOF

          cat > .gitignore <<'EOF'
          node_modules
          dist
          .vite
          coverage
          .env
          .env.*
          !.env.example
          .DS_Store
          Thumbs.db
          *.log
