            border: 1px solid #233047;
            background: #070b12;
            color: #e6edf7;
            border-radius: 0.85rem;
            padding: 0.85rem 0.95rem;
            outline: none;
          }

          .input:focus {
            border-color: #4f8cff;
            box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.18);
          }

          .primary-button,
          .ghost-button {
            border: 0;
            cursor: pointer;
            border-radius: 0.85rem;
            padding: 0.8rem 1rem;
            font-weight: 800;
          }

          .primary-button {
            width: 100%;
            margin-top: 1rem;
            background: #4f8cff;
            color: white;
          }

          .ghost-button {
            background: rgba(255, 255, 255, 0.06);
            color: #d6e1f0;
            border: 1px solid #233047;
          }

          .lock-actions,
          .topbar-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
          }

          .lock-actions {
            margin-top: 0.85rem;
          }

          .error {
            margin: 0.8rem 0 0;
            color: #ff6b6b;
          }

          .warning {
            margin: 1rem 0 0;
            color: #f5b84b;
            font-size: 0.88rem;
            line-height: 1.5;
          }

          .app-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 17rem 1fr;
          }

          .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 1rem;
            border-right: 1px solid #172238;
            background: rgba(7, 11, 18, 0.72);
            backdrop-filter: blur(14px);
          }

          .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
          }

          .sidebar-brand span {
            display: block;
            color: #8ea0ba;
            font-size: 0.78rem;
          }

          .nav-list {
            display: grid;
            gap: 0.5rem;
          }

          .nav-list a {
            color: #d6e1f0;
            text-decoration: none;
            padding: 0.75rem 0.9rem;
            border-radius: 0.85rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
          }

          .nav-list a:hover {
            border-color: #233047;
            background: rgba(255, 255, 255, 0.06);
          }

          .main-panel {
            padding: 1.25rem;
          }

          .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.25rem;
          }

          .hero-card {
            display: grid;
            grid-template-columns: 1fr 24rem;
            gap: 1rem;
            border-radius: 1.25rem;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
          }

          .security-card {
            border-radius: 1rem;
            padding: 1rem;
            background: rgba(18, 27, 42, 0.9);
          }

          .module-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 1rem;
          }

          .module-card,
          .settings-card {
            border-radius: 1.1rem;
            padding: 1rem;
          }

          .module-card-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
            margin-bottom: 0.8rem;
          }

          .status {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 0.25rem 0.55rem;
            font-size: 0.72rem;
            font-weight: 900;
          }

          .status-ready {
            color: #06101d;
            background: #45d483;
          }

          .status-planned {
            color: #06101d;
            background: #f5b84b;
          }

          .status-locked {
            color: #06101d;
            background: #ff6b6b;
          }

          .scope-list {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 1rem;
          }

          .scope-list span {
            border: 1px solid #233047;
            background: rgba(255, 255, 255, 0.04);
            color: #a7b4c7;
            border-radius: 999px;
            padding: 0.25rem 0.55rem;
            font-size: 0.72rem;
          }

          .settings-card {
            margin-top: 1rem;
          }

          @media (max-width: 1100px) {
            .module-grid {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .hero-card {
              grid-template-columns: 1fr;
            }
          }

          @media (max-width: 760px) {
            .app-shell {
              grid-template-columns: 1fr;
            }

            .sidebar {
              position: static;
              height: auto;
              border-right: 0;
              border-bottom: 1px solid #172238;
            }

            .nav-list {
              grid-template-columns: repeat(3, 1fr);
            }

            .topbar {
              flex-direction: column;
            }

            .module-grid {
              grid-template-columns: 1fr;
            }
          }
          EOF

          cat > README.md <<'EOF'
          # TornApps

          TornApps is a privacy-first personal Torn assistant. The first build is a static browser application designed for GitHub Pages and local development.

          ## MVP direction

          - Personal use first.
          - Browser-side Torn API key handling.
          - No Full Access keys.
          - No server-side key storage.
          - Responsive dark UI.
          - English and Spanish interface.
          - 30-day local history planned through browser storage.

          ## Current milestone

          `M0` creates the application shell:

          - Vite + React + TypeScript
          - Local unlock screen
          - Dashboard layout
          - Bilingual copy
          - Feature flags
          - Placeholder modules
          - GitHub Pages deployment workflow

          ## Local setup

          ```powershell
          npm install -g pnpm
          pnpm install
          pnpm dev
          ```

          ## Build and test

          ```powershell
          pnpm typecheck
          pnpm test
          pnpm build
          ```

          ## Security notes

          Never commit Torn API keys, passwords, `.env` files, or secrets. TornApps is designed so the raw Torn API key stays in the browser. The local unlock screen protects the local UI state; it is not a substitute for real server-side authentication.
          EOF

          cat > .github/workflows/deploy.yml <<'EOF'
          name: Deploy TornApps to GitHub Pages

          on:
            push:
              branches: ["main"]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: "pages"
            cancel-in-progress: false

          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup pnpm
                  uses: pnpm/action-setup@v4
                  with:
                    version: 9

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: pnpm

                - name: Install dependencies
                  run: pnpm install --frozen-lockfile=false

                - name: Typecheck
                  run: pnpm typecheck

                - name: Test
                  run: pnpm test

                - name: Build
                  run: pnpm build

                - name: Setup Pages
                  uses: actions/configure-pages@v5

                - name: Upload artifact
                  uses: actions/upload-pages-artifact@v3
                  with:
                    path: ./dist

            deploy:
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              runs-on: ubuntu-latest
              needs: build
              steps:
                - name: Deploy to GitHub Pages
                  id: deployment
                  uses: actions/deploy-pages@v4
          EOF

          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "M0: initialize TornApps static shell"
            git push
          fi
