name: Bootstrap TornApps M0

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate Vite React shell
        run: |
          set -euo pipefail
          rm -rf .tmp-vite
          npm create vite@latest .tmp-vite -- --template react-ts
          cp -R .tmp-vite/. .
          rm -rf .tmp-vite
          npm pkg set name="tornapps"
          npm pkg set private=true --json
          npm pkg set scripts.typecheck="tsc -b --pretty"
          npm pkg set scripts.test="echo no-tests-yet"

      - name: Add GitHub Pages deploy workflow
        run: |
          set -euo pipefail
          mkdir -p .github/workflows
          cat > .github/workflows/deploy.yml <<'EOF'
          name: Deploy TornApps to GitHub Pages

          on:
            push:
              branches: ["main"]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: "pages"
            cancel-in-progress: false

          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20

                - name: Install dependencies
                  run: npm install

                - name: Typecheck
                  run: npm run typecheck

                - name: Build
                  run: npm run build

                - name: Setup Pages
                  uses: actions/configure-pages@v5

                - name: Upload artifact
                  uses: actions/upload-pages-artifact@v3
                  with:
                    path: ./dist

            deploy:
              runs-on: ubuntu-latest
              needs: build
              environment:
                name: github-pages
              steps:
                - name: Deploy to GitHub Pages
                  uses: actions/deploy-pages@v4
          EOF
          sed -i 's/^          //' .github/workflows/deploy.yml

      - name: Commit generated app
        run: |
          set -euo pipefail
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "M0: initialize Vite React shell"
            git push
          fi
