          cat > src/config/features.test.ts <<'EOF'
          import { describe, expect, it } from "vitest";
          import { featureFlags, isFeatureEnabled } from "./features";

          describe("feature flags", () => {
            it("blocks full access keys by design", () => {
              expect(featureFlags.fullAccessKeyBlock).toBe(true);
            });

            it("keeps faction workspace disabled for M0", () => {
