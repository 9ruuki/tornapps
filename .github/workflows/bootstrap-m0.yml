          EOF

          cat > src/config/features.ts <<'EOF'
          export const featureFlags = {
            localUnlock: true,
            bilingualUi: true,
            dashboardShell: true,
            apiKeySetup: false,
            cooldowns: false,
            profile: false,
            travel: false,
